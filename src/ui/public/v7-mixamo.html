<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Office V7 - Mixamo 3D 角色版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }
    #container {
      width: 1400px;
      height: 800px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    #status-bar {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 100;
    }
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top: 3px solid #a78bfa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loading-text { margin-top: 20px; font-size: 14px; color: #a78bfa; }
    h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 4px; font-size: 24px; color: #a78bfa; }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div id="loading-text">載入中...</div>
  </div>

  <h1>🏢 Claude Office V7 - Mixamo 3D 版</h1>
  <div id="container"></div>

  <div id="status-bar">
    <div>🎮 Mixamo 3D 角色版</div>
    <div id="session-status" style="margin-top: 8px; font-size: 11px;">
      等待 Session 連接...
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

    // ========== 全域變數 ==========
    let scene, camera, renderer, controls;
    let ws = null;
    const characters = new Map(); // sessionId -> Character
    const sessions = new Map(); // sessionId -> SessionInfo

    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const sessionStatus = document.getElementById('session-status');

    // 工作站座標（Blender Y-forward → Three.js: x=x, y=0, z=-blender_y）
    const WORKSTATIONS = [
      { x: -6.5, z: -6.375, rot: 0 },
      { x: -4.5, z: -6.375, rot: 0 },
      { x: 0, z: -6.375, rot: 0 },
      { x: 4.5, z: -6.375, rot: 0 },
      { x: 6.5, z: -6.375, rot: 0 }
    ];

    // 牢房座標（Blender y=-5.5 → Three.js z=5.5）
    const CELLS = [
      { x: 0.8, z: 5.5, rot: 0 },
      { x: 2.4, z: 5.5, rot: 0 },
      { x: 4.0, z: 5.5, rot: 0 },
      { x: 5.6, z: 5.5, rot: 0 },
      { x: 7.2, z: 5.5, rot: 0 }
    ];

    // 動畫映射
    const ANIMATION_MAP = {
      'working': 'Typing.fbx',
      'idle': 'Sitting Idle.fbx',
      'open': 'Standing Idle.fbx',
      'walking': 'Walking.fbx',
      'closed': 'Sitting.fbx'
    };

    // ========== 碰撞牆壁定義 ==========
    const COLLISION_WALLS = [
      // 長牆（z=-3），3 個門洞（x=-5.5, 0, 5.5，門寬 1.2m）
      { x1: -8, z1: -3, x2: -6.1, z2: -3 },
      { x1: -4.9, z1: -3, x2: -0.6, z2: -3 },
      { x1: 0.6, z1: -3, x2: 4.9, z2: -3 },
      { x1: 6.1, z1: -3, x2: 8, z2: -3 },
      // 短牆/玻璃隔間
      { x1: -2.5, z1: -3.15, x2: -2.5, z2: -7 },
      { x1: 2.5, z1: -3.15, x2: 2.5, z2: -7 },
      // 會議室牆壁
      { x1: -7.85, z1: 1, x2: -7.85, z2: 6.85 },
      { x1: -7.85, z1: 6.85, x2: -2, z2: 6.85 },
      { x1: -7.85, z1: 1, x2: -2, z2: 1 },
      { x1: -2, z1: 1, x2: -2, z2: 3.4 },
      { x1: -2, z1: 4.6, x2: -2, z2: 6.85 },
      // 牢房後牆
      { x1: 0, z1: 7, x2: 8, z2: 7 },
      // 牢房左牆
      { x1: 0, z1: 4, x2: 0, z2: 7 },
      // 牢房右牆
      { x1: 8, z1: 4, x2: 8, z2: 7 },
    ];

    function pointToSegmentDistance(px, pz, x1, z1, x2, z2) {
      const dx = x2 - x1, dz = z2 - z1;
      const lenSq = dx * dx + dz * dz;
      if (lenSq === 0) return Math.sqrt((px - x1) ** 2 + (pz - z1) ** 2);
      let t = ((px - x1) * dx + (pz - z1) * dz) / lenSq;
      t = Math.max(0, Math.min(1, t));
      const nearX = x1 + t * dx, nearZ = z1 + t * dz;
      return Math.sqrt((px - nearX) ** 2 + (pz - nearZ) ** 2);
    }

    function checkCollision(x, z, radius = 0.3) {
      for (const wall of COLLISION_WALLS) {
        const dist = pointToSegmentDistance(x, z, wall.x1, wall.z1, wall.x2, wall.z2);
        if (dist < radius) return true;
      }
      return false;
    }

    // ========== 牆壁與路徑系統 ==========
    const WALL_Z = -3; // 長牆在 z = -3
    const DOORS = [
      { x: -5.5, z: WALL_Z },
      { x: 0, z: WALL_Z },
      { x: 5.5, z: WALL_Z }
    ];

    // 到達目標後的朝向（rotation.y）
    const FACING = {
      workstation: Math.PI, // 面向 z+（面向桌子）
      cell: 0               // 面向 z-（面向外面）
    };

    /**
     * 根據 x 座標判斷在哪個區域（西/中/東），用於玻璃隔間路徑規劃。
     * 玻璃隔間在 x=±2.5，將北側工作站區分成三段。
     */
    function getSection(x) {
      if (x < -2.5) return 'west';
      if (x > 2.5) return 'east';
      return 'center';
    }

    /**
     * 根據區域取得對應的門。
     * west → DOORS[0] (x=-5.5), center → DOORS[1] (x=0), east → DOORS[2] (x=5.5)
     */
    function getDoorForSection(section) {
      if (section === 'west') return DOORS[0];
      if (section === 'east') return DOORS[2];
      return DOORS[1];
    }

    /**
     * 計算從 from 到 to 的路徑（waypoint 數組）。
     * 考慮長牆（z=-3）的三個門和玻璃隔間（x=±2.5）。
     * - 同側同區域：直線。
     * - 同側跨區域（北側）：南出當前區域門 → 走到目標區域門 → 北進。
     * - 跨牆：根據目標區域選門通過。
     */
    function findPath(from, to) {
      const fromSide = from.z < WALL_Z ? 'north' : 'south';
      const toSide = to.z < WALL_Z ? 'north' : 'south';

      if (fromSide === toSide) {
        // 同側：檢查北側是否跨越玻璃隔間
        if (fromSide === 'north') {
          const fromSection = getSection(from.x);
          const toSection = getSection(to.x);
          if (fromSection !== toSection) {
            // 需要繞到牆南側再走到對應門
            const fromDoor = getDoorForSection(fromSection);
            const toDoor = getDoorForSection(toSection);
            return [
              { x: fromDoor.x, z: WALL_Z + 0.5 },  // 南出門
              { x: toDoor.x, z: WALL_Z + 0.5 },     // 走到目標門
              { x: toDoor.x, z: WALL_Z - 0.5 },     // 北進門
              { x: to.x, z: to.z }
            ];
          }
        }
        return [{ x: to.x, z: to.z }];
      }

      // 跨牆：根據目標區域選門
      const toSection = getSection(to.x);
      const targetDoor = getDoorForSection(toSection);

      return [
        { x: targetDoor.x, z: WALL_Z + 0.5 },  // 門南側
        { x: targetDoor.x, z: WALL_Z - 0.5 },  // 門北側
        { x: to.x, z: to.z }
      ];
    }

    // ========== Three.js 初始化 ==========
    async function initThreeJS() {
      loadingText.textContent = '初始化 3D 場景...';

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a2e);

      camera = new THREE.PerspectiveCamera(60, 1400 / 800, 0.1, 1000);
      camera.position.set(0, 12, 15);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(1400, 800);
      renderer.shadowMap.enabled = true;
      document.getElementById('container').appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      // 燈光
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(10, 20, 10);
      dirLight.castShadow = true;
      scene.add(dirLight);

      // 網格（參考用，辦公室模型已有地板）
      const grid = new THREE.GridHelper(30, 30, 0x444444, 0x222222);
      scene.add(grid);

      // 載入辦公室 GLB 模型
      loadingText.textContent = '載入辦公室模型...';
      const gltfLoader = new GLTFLoader();
      try {
        const gltf = await new Promise((resolve, reject) => {
          gltfLoader.load(
            '/blender/exports/office_v64.glb',
            resolve,
            (progress) => {
              if (progress.total > 0) {
                const pct = Math.round((progress.loaded / progress.total) * 100);
                loadingText.textContent = `載入辦公室模型... ${pct}%`;
              }
            },
            reject
          );
        });

        const officeModel = gltf.scene;
        let barsHidden = 0;
        officeModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;

            // 玻璃牆壁和會議室牆壁設為半透明
            const matName = child.material?.name || '';
            if (matName.includes('Glass') || matName.includes('MeetingRoomWall')) {
              child.material.transparent = true;
              child.material.opacity = 0.3;
              child.material.side = THREE.DoubleSide;
              child.castShadow = false; // 透明物體不投射陰影
              console.log(`[Three.js] 設定半透明材質: ${matName}`);
            }
          }

          // 隱藏奇數欄杆（減少密度），保留框架橫桿（TopBar, BottomBar, LeftBar, RightBar）
          const barMatch = child.name.match(/_Bar_(\d+)$/);
          if (barMatch) {
            const barIndex = parseInt(barMatch[1]);
            if (barIndex % 2 === 1) {
              child.visible = false;
              barsHidden++;
            }
          }
        });
        console.log(`[Three.js] 隱藏了 ${barsHidden} 根奇數欄杆`);
        scene.add(officeModel);
        console.log('[Three.js] 辦公室模型載入完成');
      } catch (err) {
        console.error('[Three.js] 辦公室模型載入失敗:', err);
      }

      // 調整相機以涵蓋辦公室和角色
      camera.position.set(0, 12, 15);
      controls.target.set(0, 1, -2);
      controls.update();

      console.log('[Three.js] 場景初始化完成');
    }

    // ========== 載入 Mixamo 角色 ==========
    async function loadCharacterModel(sessionId, index) {
      loadingText.textContent = `載入角色 ${index + 1}/5...`;

      const loader = new FBXLoader();

      // 載入默認動畫（Standing Idle）
      const model = await loader.loadAsync('/mixamo/Standing Idle.fbx');

      // 縮放
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const scale = 1.7 / size.y; // 1.7 米高
      model.scale.setScalar(scale);

      // 陰影
      model.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      // 初始位置：牢房
      const cellPos = CELLS[index];
      model.position.set(cellPos.x, 0, cellPos.z);
      model.rotation.y = cellPos.rot;

      scene.add(model);

      // 創建角色對象
      const character = {
        model: model,
        mixer: new THREE.AnimationMixer(model),
        currentAction: null,
        currentPosition: 'cell',
        currentState: 'idle',
        animations: {},
        // 行走移動系統
        path: [],           // [{x, z}, ...] 路徑點列表
        pathIndex: 0,       // 當前目標路徑點索引
        isMoving: false,
        moveSpeed: 2.0,     // 單位/秒
        targetAnimation: null, // 到達後播放的動畫名
        targetRotation: 0     // 到達後的朝向
      };

      // 播放初始動畫
      if (model.animations.length > 0) {
        const action = character.mixer.clipAction(model.animations[0]);
        action.play();
        character.currentAction = action;
        character.animations['idle'] = model.animations[0];
      }

      characters.set(sessionId, character);
      console.log(`[Character] 角色 ${sessionId} 載入完成`);

      return character;
    }

    // ========== 切換動畫 ==========
    async function switchAnimation(character, animationName) {
      const animFile = ANIMATION_MAP[animationName];
      if (!animFile) return;

      // 載入動畫（如果還沒載入）
      if (!character.animations[animationName]) {
        const loader = new FBXLoader();
        const animModel = await loader.loadAsync(`/mixamo/${animFile}`);

        if (animModel.animations.length > 0) {
          character.animations[animationName] = animModel.animations[0];
        }
      }

      const clip = character.animations[animationName];
      if (!clip) return;

      // 平滑切換
      if (character.currentAction) {
        character.currentAction.fadeOut(0.3);
      }

      const action = character.mixer.clipAction(clip);
      action.reset().fadeIn(0.3).play();
      character.currentAction = action;
      character.currentState = animationName;

      // 坐姿高度調整 -- 必須在動畫實際切換後（await 之後）
      if (animationName === 'idle' || animationName === 'closed' || animationName === 'working') {
        character.model.position.y = 0.45; // 椅子座面高度
      } else {
        character.model.position.y = 0; // 站立
      }

      console.log('[Animation] 切換到: ' + animationName + ', y=' + character.model.position.y);
    }

    // ========== 移動角色 ==========
    function moveCharacterTo(character, targetType, targetIndex) {
      const targetCoords = targetType === 'workstation'
        ? WORKSTATIONS[targetIndex]
        : CELLS[targetIndex];

      const from = {
        x: character.model.position.x,
        z: character.model.position.z
      };
      const to = { x: targetCoords.x, z: targetCoords.z };

      // 如果已經在目標位置附近（距離 < 0.3），不需要移動
      const dx = to.x - from.x;
      const dz = to.z - from.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 0.3) {
        character.currentPosition = targetType;
        return;
      }

      // 計算路徑
      const path = findPath(from, to);

      // 設定移動狀態
      character.path = path;
      character.pathIndex = 0;
      character.isMoving = true;
      character.targetRotation = FACING[targetType] !== undefined ? FACING[targetType] : 0;
      character.currentPosition = targetType;

      // 切換到行走動畫
      switchAnimation(character, 'walking');

      console.log(`[Movement] 角色開始移動，路徑點: ${path.length}，距離: ${dist.toFixed(1)}`);
    }

    /**
     * 每幀更新移動中的角色位置。
     * 在 animate() 中調用。
     */
    function updateCharacterMovement(character, delta) {
      if (!character.isMoving || character.path.length === 0) return;

      const target = character.path[character.pathIndex];
      const pos = character.model.position;

      const dx = target.x - pos.x;
      const dz = target.z - pos.z;
      const dist = Math.sqrt(dx * dx + dz * dz);

      // 面向行進方向
      if (dist > 0.01) {
        const angle = Math.atan2(dx, dz);
        character.model.rotation.y = angle;
      }

      const step = character.moveSpeed * delta;

      if (dist <= step) {
        // 到達當前路徑點（碰撞檢查：若目標點在牆內則跳過）
        if (!checkCollision(target.x, target.z)) {
          pos.x = target.x;
          pos.z = target.z;
        }
        character.pathIndex++;

        if (character.pathIndex >= character.path.length) {
          // 到達最終目標
          character.isMoving = false;
          character.path = [];
          character.pathIndex = 0;
          character.model.rotation.y = character.targetRotation;

          // 切換到目標動畫（由 updateCharacterStates 中設定）
          if (character.targetAnimation) {
            switchAnimation(character, character.targetAnimation);
            character.targetAnimation = null;
          }

          console.log(`[Movement] 角色到達目的地`);
        }
      } else {
        // 朝目標移動（碰撞檢查：若新位置會撞牆則嘗試沿軸滑動）
        const newX = pos.x + dx * (step / dist);
        const newZ = pos.z + dz * (step / dist);
        if (!checkCollision(newX, newZ)) {
          pos.x = newX;
          pos.z = newZ;
        } else if (!checkCollision(newX, pos.z)) {
          // 沿 X 軸滑動
          pos.x = newX;
        } else if (!checkCollision(pos.x, newZ)) {
          // 沿 Z 軸滑動
          pos.z = newZ;
        }
        // 若兩軸都碰撞，角色原地不動等下一幀
      }
    }

    // ========== WebSocket 連接 ==========
    function connectWebSocket() {
      loadingText.textContent = '連接 Session Monitor...';

      ws = new WebSocket(`ws://${location.hostname}:8053`);

      ws.onopen = () => {
        console.log('[WS] 已連接到 Session Monitor');
        updateSessionStatus('已連接到 Session Monitor');
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'sync') {
          handleSessionSync(data.sessions);
        }
      };

      ws.onerror = (error) => {
        console.error('[WS] 連接錯誤:', error);
        updateSessionStatus('連接錯誤，嘗試重連...');
        setTimeout(connectWebSocket, 3000);
      };

      ws.onclose = () => {
        console.log('[WS] 連接關閉，嘗試重連...');
        updateSessionStatus('連接關閉，嘗試重連...');
        setTimeout(connectWebSocket, 3000);
      };
    }

    // ========== 處理 Session 同步 ==========
    async function handleSessionSync(sessionList) {
      // 更新 Session 狀態
      sessions.clear();
      sessionList.forEach((session, index) => {
        if (index < 5) {
          sessions.set(session.id, session);
        }
      });

      // 確保每個 Session 都有對應角色
      for (const [sessionId, session] of sessions) {
        if (!characters.has(sessionId)) {
          const index = Array.from(sessions.keys()).indexOf(sessionId);
          await loadCharacterModel(sessionId, index);
        }
      }

      // 更新角色狀態
      updateCharacterStates();

      // 更新狀態欄
      updateSessionStatus(`${sessions.size} 個 Session 活躍`);
    }

    // ========== 更新角色狀態 ==========
    function updateCharacterStates() {
      const sessionArray = Array.from(sessions.values());

      sessionArray.forEach((session, index) => {
        const character = characters.get(session.id);
        if (!character) return;

        // 決定目標位置和到達後的動畫
        let targetType, targetAnim;
        switch (session.status) {
          case 'working':
            targetType = 'workstation';
            targetAnim = 'working';
            break;
          case 'idle':
            targetType = 'workstation';
            targetAnim = 'idle';
            break;
          case 'open':
            targetType = 'workstation';
            targetAnim = 'open';
            break;
          default:
            targetType = 'cell';
            targetAnim = 'closed';
        }

        // 設定到達後要播放的動畫
        character.targetAnimation = targetAnim;

        // 開始移動（moveCharacterTo 會判斷是否需要移動）
        moveCharacterTo(character, targetType, index);

        // 如果不需要移動（已在目標位置），直接切動畫並確保坐姿
        if (!character.isMoving) {
          if (character.currentState !== targetAnim) {
            switchAnimation(character, targetAnim);
          } else {
            // 即使動畫相同，也強制確保 y 座標正確（防止漏設）
            if (targetAnim === 'idle' || targetAnim === 'closed' || targetAnim === 'working') {
              character.model.position.y = 0.45;
            } else {
              character.model.position.y = 0;
            }
          }
          character.targetAnimation = null;
        }
      });
    }

    // ========== 更新狀態欄 ==========
    function updateSessionStatus(text) {
      sessionStatus.textContent = text;
    }

    // ========== 動畫循環 ==========
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      // 更新所有角色的移動和動畫
      characters.forEach(character => {
        updateCharacterMovement(character, delta);
        if (character.mixer) {
          character.mixer.update(delta);
        }
      });

      controls.update();
      renderer.render(scene, camera);
    }

    // ========== 主程式 ==========
    async function main() {
      try {
        await initThreeJS();
        connectWebSocket();

        window.addEventListener('resize', () => {
          camera.aspect = 1400 / 800;
          camera.updateProjectionMatrix();
          renderer.setSize(1400, 800);
        });

        loadingOverlay.classList.add('hidden');
        animate();

        // 暴露到 window 方便調試
        window.camera = camera;
        window.controls = controls;
        window.scene = scene;

        console.log('[V7-Mixamo] 系統啟動完成！');
      } catch (error) {
        console.error('[V7-Mixamo] 啟動失敗:', error);
        loadingText.textContent = `錯誤: ${error.message}`;
      }
    }

    main();
  </script>
</body>
</html>
