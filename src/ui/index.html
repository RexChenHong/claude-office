<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Office</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
    }

    #game-container {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #status-bar {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 100;
    }

    #status-bar .connected {
      color: #4ade80;
    }

    #status-bar .disconnected {
      color: #f87171;
    }

    h1 {
      margin-bottom: 20px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 24px;
      color: #a78bfa;
    }
  </style>
</head>
<body>
  <h1>🏢 Claude Office（V5.2 - 完整細節 + 低曝光）</h1>
  <div id="app">
    <div id="game-container"></div>
    <div id="error-message" style="color: #f87171; margin-top: 10px; text-align: center;"></div>
  </div>
  <div id="status-bar">
    <div>🏢 Three.js V5.2 - 完整細節</div>
    <div id="character-info" style="margin-top: 8px; font-size: 11px;">
      5人工作站 + 會議室 + 休息區<br>
      檔案夾 + 筆 + 書籍 + 咖啡杯<br>
      掛畫 + 時鐘 + 植物 + 低曝光
    </div>
  </div>

  <script type="module" src="/src/main-office-v5.2.js"></script>
</body>
</html>
