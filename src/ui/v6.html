<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Office V6 - Blender</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    #game-container { border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
    #status-bar { position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); padding: 10px 15px; border-radius: 8px; font-size: 12px; z-index: 100; }
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    #loading-overlay.hidden { display: none; }
    .loading-spinner { width: 50px; height: 50px; border: 3px solid #333; border-top: 3px solid #a78bfa; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loading-text { margin-top: 20px; font-size: 14px; color: #a78bfa; }
    h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; font-size: 24px; color: #a78bfa; }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div id="loading-text">載入 Blender 模型中...</div>
  </div>

  <h1>🏢 Claude Office V6（PBR 紋理版）</h1>
  <div id="app">
    <div id="game-container"></div>
    <div id="error-message" style="color: #f87171; margin-top: 10px; text-align: center;"></div>
  </div>
  <div id="status-bar">
    <div>🏢 Three.js V6 - PBR 紋理</div>
    <div id="model-info" style="margin-top: 8px; font-size: 11px;">
      木地板紋理 + 布料紋理<br>
      圓角邊緣 + 軟陰影
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls;
    let clock;
    let officeModel = null;
    let loadingOverlay = document.getElementById('loading-overlay');
    let loadingText = document.getElementById('loading-text');

    // ========== 紋理載入器 ==========
    const textureLoader = new THREE.TextureLoader();
    let woodTexture = null;
    let fabricTexture = null;

    // 預載紋理
    function loadTextures() {
      return new Promise((resolve) => {
        let loaded = 0;
        const total = 2;
        
        const checkDone = () => {
          loaded++;
          if (loaded >= total) resolve();
        };

        // 木地板紋理
        textureLoader.load(
          '/blender/textures/wood_diffuse.jpg',
          (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(8, 8);  // 重複 8 次
            woodTexture = texture;
            console.log('[V6] 木地板紋理載入成功');
            checkDone();
          },
          undefined,
          () => { console.warn('[V6] 木地板紋理載入失敗'); checkDone(); }
        );

        // 布料紋理
        textureLoader.load(
          '/blender/textures/fabric_diffuse.jpg',
          (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2);
            fabricTexture = texture;
            console.log('[V6] 布料紋理載入成功');
            checkDone();
          },
          undefined,
          () => { console.warn('[V6] 布料紋理載入失敗'); checkDone(); }
        );
      });
    }

    function init() {
      console.log('[V6] 初始化...');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x2a2a3e);

      camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(12, 8, 12);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.getElementById('game-container').appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.target.set(0, 0.5, 0);

      clock = new THREE.Clock();

      setupLighting();
      
      // 先載入紋理，再載入模型
      loadTextures().then(() => {
        loadOfficeModel();
      });

      window.addEventListener('resize', onWindowResize);
    }

    function loadOfficeModel() {
      loadingText.textContent = '載入辦公室模型...';
      console.log('[V6] 載入模型...');

      const loader = new GLTFLoader();

      loader.load(
        '/blender/exports/office_v64.glb',
        (gltf) => {
          officeModel = gltf.scene;
          console.log('[V6] 模型載入成功！');

          // 遍歷所有 mesh，應用紋理和材質
          officeModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;

              const matName = child.material?.name?.toLowerCase() || '';
              const objName = child.name?.toLowerCase() || '';
              
              // 玻璃隔間 - 半透明（調高可見度）
              if (matName.includes('glass') || objName.includes('glass') || matName.includes('meetingroomwall')) {
                child.material = new THREE.MeshPhysicalMaterial({
                  color: 0xd8ecf2,
                  transparent: true,
                  opacity: 0.6,  // 提高不透明度
                  roughness: 0.1,
                  metalness: 0.0,
                  transmission: 0.5,  // 降低透光度
                  thickness: 0.5
                });
                console.log(`[V6] 應用玻璃到: ${child.name}`);
              }
              // 電視 - 完全不透明
              else if (matName.includes('tv') || objName.includes('tv')) {
                const isScreen = matName.includes('screen') || objName.includes('screen');
                child.material = new THREE.MeshStandardMaterial({
                  color: isScreen ? 0x0a0a0a : 0x050505,
                  roughness: isScreen ? 0.02 : 0.15,
                  metalness: isScreen ? 0.0 : 0.7,
                  transparent: false,
                  opacity: 1.0,
                  emissive: isScreen ? 0x1a2430 : 0x000000,
                  emissiveIntensity: isScreen ? 0.5 : 0.0
                });
                console.log(`[V6] 應用電視到: ${child.name} (screen: ${isScreen})`);
              }
              // 牆壁 - 淺灰色不透明
              else if (matName.includes('wall') || objName.includes('wall')) {
                child.material = new THREE.MeshStandardMaterial({
                  color: 0xd8d8d8,
                  roughness: 0.9,
                  metalness: 0.0
                });
                console.log(`[V6] 應用牆壁到: ${child.name}`);
              }
              // 地板 - 應用木紋
              else if (matName.includes('wood') || matName.includes('floor') || child.geometry.type === 'PlaneGeometry') {
                if (woodTexture) {
                  child.material = new THREE.MeshStandardMaterial({
                    map: woodTexture,
                    roughness: 0.7,
                    metalness: 0.0
                  });
                  console.log(`[V6] 應用木紋到: ${child.name || child.material?.name}`);
                }
              }
              // 椅座/沙發 - 應用布料
              else if (matName.includes('fabric') || matName.includes('seat') || matName.includes('sofa') || objName.includes('seat') || objName.includes('chairback')) {
                if (fabricTexture) {
                  child.material = new THREE.MeshStandardMaterial({
                    map: fabricTexture,
                    roughness: 0.9,
                    metalness: 0.0
                  });
                  console.log(`[V6] 應用布料到: ${child.name || child.material?.name}`);
                }
              }
              // 其他材質
              else if (child.material) {
                child.material.roughness = 0.7;
                child.material.metalness = 0.1;
              }
            }
          });

          const box = new THREE.Box3().setFromObject(officeModel);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());

          scene.add(officeModel);

          const maxDim = Math.max(size.x, size.y, size.z);
          camera.position.set(center.x + maxDim * 0.6, center.y + maxDim * 0.4, center.z + maxDim * 0.6);
          controls.target.copy(center);
          controls.update();

          loadingOverlay.classList.add('hidden');
          console.log('[V6] 完成！');
        },
        (progress) => {
          if (progress.total > 0) {
            const percent = (progress.loaded / progress.total * 100).toFixed(0);
            loadingText.textContent = `載入中... ${percent}%`;
          }
        },
        (error) => {
          console.error('[V6] 載入失敗:', error);
          loadingText.textContent = '載入失敗';
          loadingOverlay.classList.add('hidden');
        }
      );
    }

    function setupLighting() {
      // 環境光
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      // 半球光（天空 + 地面）
      const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.4);
      hemisphereLight.position.set(0, 10, 0);
      scene.add(hemisphereLight);

      // 主光源（模擬窗戶光）
      const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.0);
      mainLight.position.set(8, 12, 4);
      mainLight.castShadow = true;
      mainLight.shadow.mapSize.width = 2048;
      mainLight.shadow.mapSize.height = 2048;
      mainLight.shadow.camera.near = 0.5;
      mainLight.shadow.camera.far = 50;
      mainLight.shadow.camera.left = -15;
      mainLight.shadow.camera.right = 15;
      mainLight.shadow.camera.top = 15;
      mainLight.shadow.camera.bottom = -15;
      mainLight.shadow.bias = -0.0001;
      scene.add(mainLight);

      // 補光
      const fillLight = new THREE.DirectionalLight(0xe6f0ff, 0.4);
      fillLight.position.set(-8, 8, -4);
      scene.add(fillLight);

      // 天花板燈光
      const ceilingLight = new THREE.PointLight(0xffffff, 0.6, 20);
      ceilingLight.position.set(0, 2.7, 0);
      scene.add(ceilingLight);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
