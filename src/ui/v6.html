<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Office V6 - Blender</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
    }

    #game-container {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #status-bar {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 100;
    }

    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #loading-overlay.hidden {
      display: none;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top: 3px solid #a78bfa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #loading-text {
      margin-top: 20px;
      font-size: 14px;
      color: #a78bfa;
    }

    h1 {
      margin-bottom: 20px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 24px;
      color: #a78bfa;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div id="loading-text">載入 Blender 模型中...</div>
  </div>

  <h1>🏢 Claude Office V6（Blender 建模）</h1>
  <div id="app">
    <div id="game-container"></div>
    <div id="error-message" style="color: #f87171; margin-top: 10px; text-align: center;"></div>
  </div>
  <div id="status-bar">
    <div>🏢 Three.js V6 - Blender 建模</div>
    <div id="model-info" style="margin-top: 8px; font-size: 11px;">
      5人辦公室場景<br>
      辦公桌 + 椅子 + 雙螢幕<br>
      鍵盤 + 滑鼠 + 檯燈 + 盆栽
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    let scene, camera, renderer, controls, composer;
    let clock;
    let officeModel = null;
    let loadingOverlay = document.getElementById('loading-overlay');
    let loadingText = document.getElementById('loading-text');

    function init() {
      console.log('[V6] 初始化...');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xE8E8E8);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(15, 10, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.getElementById('game-container').appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.target.set(0, 0.5, 0);

      clock = new THREE.Clock();

      setupLighting();
      setupPostProcessing();
      loadOfficeModel();

      window.addEventListener('resize', onWindowResize);
    }

    function loadOfficeModel() {
      loadingText.textContent = '載入 5 人辦公室模型...';
      console.log('[V6] 載入模型...');

      const loader = new GLTFLoader();

      loader.load(
        '/blender/exports/office_complete.glb',
        (gltf) => {
          officeModel = gltf.scene;
          console.log('[V6] 模型載入成功！', officeModel);

          officeModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          const box = new THREE.Box3().setFromObject(officeModel);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());

          console.log('[V6] 模型尺寸:', size);

          scene.add(officeModel);

          const maxDim = Math.max(size.x, size.y, size.z);
          camera.position.set(center.x + maxDim * 0.8, center.y + maxDim * 0.5, center.z + maxDim * 0.8);
          controls.target.copy(center);
          controls.update();

          // 隱藏載入畫面
          loadingOverlay.classList.add('hidden');

          console.log('[V6] 完成！');
        },
        (progress) => {
          if (progress.total > 0) {
            const percent = (progress.loaded / progress.total * 100).toFixed(0);
            loadingText.textContent = `載入中... ${percent}%`;
          }
        },
        (error) => {
          console.error('[V6] 載入失敗:', error);
          loadingText.textContent = '載入失敗，嘗試備用方案...';

          // 備用：創建簡單場景
          createFallbackScene();
          loadingOverlay.classList.add('hidden');
        }
      );
    }

    function createFallbackScene() {
      const floorGeometry = new THREE.PlaneGeometry(20, 20);
      const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 });
      const floor = new THREE.Mesh(floorGeometry, floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      for (let i = 0; i < 5; i++) {
        const marker = new THREE.Mesh(
          new THREE.BoxGeometry(1.2, 0.1, 0.6),
          new THREE.MeshStandardMaterial({ color: 0xffffff })
        );
        marker.position.set(-6 + i * 3, 0.75, 0);
        marker.castShadow = true;
        scene.add(marker);
      }
    }

    function setupLighting() {
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.6);
      scene.add(hemisphereLight);

      const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
      mainLight.position.set(10, 15, 5);
      mainLight.castShadow = true;
      mainLight.shadow.mapSize.width = 2048;
      mainLight.shadow.mapSize.height = 2048;
      mainLight.shadow.camera.near = 0.5;
      mainLight.shadow.camera.far = 50;
      mainLight.shadow.camera.left = -15;
      mainLight.shadow.camera.right = 15;
      mainLight.shadow.camera.top = 15;
      mainLight.shadow.camera.bottom = -15;
      scene.add(mainLight);

      const fillLight = new THREE.DirectionalLight(0xe6f0ff, 0.5);
      fillLight.position.set(-10, 10, -5);
      scene.add(fillLight);
    }

    function setupPostProcessing() {
      composer = new EffectComposer(renderer);

      const renderPass = new RenderPass(scene, camera);
      composer.addPass(renderPass);

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.3, 0.4, 0.85
      );
      composer.addPass(bloomPass);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      if (composer) composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      if (composer) {
        composer.render();
      } else {
        renderer.render(scene, camera);
      }
    }

    init();
    animate();
  </script>
</body>
</html>
